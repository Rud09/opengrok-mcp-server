name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run package

      - name: Build VSIX
        run: npm run vsix

      - name: Package standalone server
        run: npm run package-server

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release body
        run: node scripts/generate-release-notes.js "${{ steps.version.outputs.version }}" > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: release-body.md
          fail_on_unmatched_files: true
          files: |
            opengrok-mcp-server-${{ steps.version.outputs.version }}.vsix
            opengrok-mcp-server-${{ steps.version.outputs.version }}-linux.tar.gz
            opengrok-mcp-server-${{ steps.version.outputs.version }}-darwin.tar.gz
            opengrok-mcp-server-${{ steps.version.outputs.version }}-win.zip

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
